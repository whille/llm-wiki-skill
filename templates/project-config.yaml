# 项目级 LLM-Wiki 配置
# 将此文件放在 Git 项目根目录

# 排除目录（这些目录的变更不触发提示）
exclude_dirs:
  - wiki/
  - data/
  - results/
  - output/
  - logs/
  - __pycache__/
  - .pytest_cache/
  - .ruff_cache/
  - node_modules/

# 排除文件模式（这些类型的文件不触发提示）
exclude_patterns:
  - "*.json"
  - "*.txt"
  - "*.log"
  - "*.md"

# Wiki 目录（相对于项目根目录）
wiki_dir: wiki/

# 原始素材目录
raw_dir: raw/

# 是否启用代码变更自动触发（通过 Git Hook）
git_hook_enabled: false

# 代码行变化阈值（增删行数之和 >= 此值时提示建议 digest）
line_threshold: 100
