</script>

<script src="vis-network.min.js" defer onerror="__libLoadFailed('vis-network')"></script>
<script src="marked.min.js"     defer onerror="__libLoadFailed('marked')"></script>
<script src="purify.min.js"     defer onerror="__libLoadFailed('purify')"></script>

<script>
// graph-template-footer.html
// 交互式知识图谱运行时脚本。依赖：vis-network、marked、DOMPurify。
// 设计文档（Addenda）锁定的 11 个交互状态在下方一一实现。

(function () {
  "use strict";

  // ─── 0. DOM 速查 ─────────────────────────────────────────────
  var $ = function (id) { return document.getElementById(id); };
  var dom = {
    layout:          $("layout"),
    canvas:          $("canvas"),
    drawer:          $("drawer"),
    drawerTitle:     $("drawer-title"),
    drawerBadge:     $("drawer-badge"),
    drawerBody:      $("drawer-body"),
    drawerClose:     $("drawer-close"),
    drawerBanner:    $("drawer-banner"),
    drawerBannerTxt: $("drawer-banner-text"),
    drawerOpenFull:  $("drawer-open-full"),
    search:          $("search"),
    searchDropdown:  $("search-dropdown"),
    fltExtracted:    $("flt-extracted"),
    fltInferred:     $("flt-inferred"),
    fltAmbiguous:    $("flt-ambiguous"),
    partialPill:     $("partial-pill"),
    pillShown:       $("pill-shown"),
    pillTotal:       $("pill-total"),
    toast:           $("canvas-toast"),
    stateLoading:    $("state-loading"),
    loadingCount:    $("loading-count"),
    stateEmpty:      $("state-empty"),
    bannerJson:      $("banner-json"),
    bannerJsonMsg:   $("banner-json-msg"),
    overlayFile:     $("overlay-file"),
    overlayMobile:   $("overlay-mobile"),
    overlayMobileContinue: $("overlay-mobile-continue"),
    brandNodes:      $("brand-nodes"),
    brandEdges:      $("brand-edges"),
    footShown:       $("foot-shown"),
    footTotal:       $("foot-total"),
    footIsolated:    $("foot-isolated"),
    footCommunities: $("foot-communities"),
    footFilter:      $("foot-filter")
  };

  // ─── 1. 全局状态 ─────────────────────────────────────────────
  var state = {
    data: null,        // 原始 graph-data.json
    nodes: null,       // vis.DataSet（当前渲染的）
    edges: null,       // vis.DataSet（当前渲染的）
    network: null,
    initialVisible: null, // Set<nodeId>（meta.initial_view）
    visible: null,     // Set<nodeId>（当前已加入画布的节点）
    filters: { EXTRACTED: true, INFERRED: true, AMBIGUOUS: false },
    isolatedCount: 0,
    searchTimer: null,
    toastTimer: null,
    mobileAccepted: false
  };

  // 颜色从 CSS 变量读，避免 JS / CSS 双源维护
  var css = getComputedStyle(document.documentElement);
  function cssVar(name, fallback) {
    var v = css.getPropertyValue(name).trim();
    return v || fallback;
  }
  var palette = {
    edge: {
      EXTRACTED: cssVar("--edge-extracted", "#2d7a3e"),
      INFERRED:  cssVar("--edge-inferred",  "#7a5c2d"),
      AMBIGUOUS: cssVar("--edge-ambiguous", "#7a2d2d")
    },
    node: [
      cssVar("--node-c1"), cssVar("--node-c2"), cssVar("--node-c3"),
      cssVar("--node-c4"), cssVar("--node-c5"), cssVar("--node-c6"),
      cssVar("--node-c7"), cssVar("--node-c8")
    ],
    nodeOther: cssVar("--node-c-other", "#9a9a9a"),
    text:     cssVar("--text",     "#1a1a1a"),
    textDim:  cssVar("--text-dim", "#6b6b6b"),
    surface:  cssVar("--surface",  "#ffffff")
  };

  // ─── 2. 启动入口 ─────────────────────────────────────────────
  // DOMContentLoaded 时主 JSON 已内联；vendor JS 因为 `defer` 会在本脚本
  // 之后、DOMContentLoaded 之前执行完——但 ERROR-FILE 状态下它们可能根本
  // 没加载。我们用两道检查：lib 加载错误立即弹 overlay；正常时 delay 3s
  // 后检查 window.vis 是否存在。
  document.addEventListener("DOMContentLoaded", function () {
    if (detectMobile()) return; // 提示后视用户选择
    if (!parseData()) return;
    if (!checkVendorsReady()) return;
    boot();
  });

  function __libLoadFailed(/* name */) {
    // script onerror —— file:// 下 Safari 常见
    showOverlayFile();
  }
  // 把 __libLoadFailed 暴露到 window（onerror 属性会查全局）
  window.__libLoadFailed = __libLoadFailed;

  function detectMobile() {
    if (window.innerWidth >= 768 || state.mobileAccepted) return false;
    dom.overlayMobile.setAttribute("data-show", "1");
    dom.overlayMobileContinue.addEventListener("click", function () {
      state.mobileAccepted = true;
      dom.overlayMobile.setAttribute("data-show", "0");
      document.addEventListener("DOMContentLoaded", function () {
        if (!parseData()) return;
        if (!checkVendorsReady()) return;
        boot();
      });
      // DOMContentLoaded 已触发，直接重入
      if (!parseData()) return;
      if (!checkVendorsReady()) return;
      boot();
    }, { once: true });
    return true;
  }

  // ─── 3. 数据解析（ERROR-JSON / EMPTY）──────────────────────────
  function parseData() {
    var raw;
    try {
      var tag = $("graph-data");
      if (!tag) throw new Error("缺少 graph-data 标签");
      raw = JSON.parse(tag.textContent || "{}");
    } catch (e) {
      showJsonError(e.message || String(e));
      return false;
    }
    if (!raw || !Array.isArray(raw.nodes) || !Array.isArray(raw.edges)) {
      showJsonError("nodes / edges 字段缺失或非数组");
      return false;
    }
    state.data = raw;
    if (raw.nodes.length < 3) {
      dom.stateEmpty.hidden = false;
      syncBrandAndFooter();
      return false;
    }
    return true;
  }

  function showJsonError(msg) {
    dom.bannerJsonMsg.textContent = msg;
    dom.bannerJson.setAttribute("data-show", "1");
  }

  // ─── 4. Vendor 检查（ERROR-FILE）─────────────────────────────
  function checkVendorsReady() {
    var ready = (typeof vis !== "undefined")
             && (typeof marked !== "undefined")
             && (typeof DOMPurify !== "undefined");
    if (!ready) {
      // 3 秒后再查一次；仍不行则弹 overlay
      setTimeout(function () {
        if (typeof vis === "undefined"
            || typeof marked === "undefined"
            || typeof DOMPurify === "undefined") {
          showOverlayFile();
        } else {
          boot();
        }
      }, 3000);
      dom.stateLoading.hidden = false;
      dom.loadingCount.textContent = state.data.nodes.length;
      return false;
    }
    return true;
  }

  function showOverlayFile() {
    dom.overlayFile.setAttribute("data-show", "1");
  }

  // ─── 5. 构建初始 top-30（U2 算法）────────────────────────────
  function buildInitialSet() {
    var meta = state.data.meta || {};
    if (Array.isArray(meta.initial_view) && meta.initial_view.length) {
      return new Set(meta.initial_view);
    }
    // 兜底：build-graph-data.sh 没给时，JS 端再算一次（按社区代表 + 度补齐）
    var nodes = state.data.nodes;
    var degree = {};
    state.data.edges.forEach(function (e) {
      degree[e.from] = (degree[e.from] || 0) + 1;
      degree[e.to]   = (degree[e.to]   || 0) + 1;
    });
    var byCommunity = {};
    nodes.forEach(function (n) {
      var c = n.community == null ? "_" : String(n.community);
      if (!byCommunity[c]) byCommunity[c] = [];
      byCommunity[c].push(n);
    });
    var picked = new Set();
    Object.keys(byCommunity).forEach(function (c) {
      var group = byCommunity[c].slice().sort(function (a, b) {
        return (degree[b.id] || 0) - (degree[a.id] || 0);
      });
      if (group[0]) picked.add(group[0].id);
    });
    if (picked.size >= 30 || picked.size >= nodes.length) return picked;
    var rest = nodes.slice().filter(function (n) { return !picked.has(n.id); })
                    .sort(function (a, b) {
                      return (degree[b.id] || 0) - (degree[a.id] || 0);
                    });
    for (var i = 0; i < rest.length && picked.size < 30; i++) {
      picked.add(rest[i].id);
    }
    return picked;
  }

  // ─── 6. 构建 vis DataSet ─────────────────────────────────────
  function edgeStyle(type) {
    var color = palette.edge[type] || palette.edge.EXTRACTED;
    var base = { color: { color: color, highlight: color, hover: color },
                 width: 0.8, selectionWidth: 2, hoverWidth: 1.5 };
    if (type === "INFERRED")  base.dashes = [4, 4];
    if (type === "AMBIGUOUS") base.dashes = [1, 3];
    return base;
  }

  function nodeStyle(n) {
    var c = n.community == null ? 0
          : (typeof n.community === "number" ? n.community
             : (n.community.charCodeAt ? n.community.charCodeAt(0) : 0));
    var idx = ((c % palette.node.length) + palette.node.length) % palette.node.length;
    var color = palette.node[idx] || palette.nodeOther;
    return {
      color: { background: palette.surface, border: color, highlight: { border: color, background: palette.surface } },
      borderWidth: 1.5, borderWidthSelected: 3,
      size: 8,
      font: { size: 12, color: palette.text, face: "-apple-system, sans-serif" }
    };
  }

  function buildDataSets() {
    state.initialVisible = buildInitialSet();
    state.visible = new Set(state.initialVisible);

    var visibleEdges = state.data.edges.filter(function (e) {
      if (!state.filters[e.type || "EXTRACTED"]) return false;
      return state.visible.has(e.from) && state.visible.has(e.to);
    });

    var nodeItems = state.data.nodes
      .filter(function (n) { return state.visible.has(n.id); })
      .map(function (n) {
        return Object.assign({ id: n.id, label: n.label || n.id }, nodeStyle(n));
      });

    var edgeItems = visibleEdges.map(function (e, i) {
      return Object.assign(
        { id: e.id || "e" + i, from: e.from, to: e.to, type: e.type || "EXTRACTED" },
        edgeStyle(e.type || "EXTRACTED")
      );
    });

    state.nodes = new vis.DataSet(nodeItems);
    state.edges = new vis.DataSet(edgeItems);

    // 孤立节点 = 全图中没有任何边连接的节点
    var touched = {};
    state.data.edges.forEach(function (e) { touched[e.from] = 1; touched[e.to] = 1; });
    state.isolatedCount = state.data.nodes.filter(function (n) {
      return !touched[n.id];
    }).length;
  }

  // ─── 7. 启动 network ─────────────────────────────────────────
  function boot() {
    dom.stateLoading.hidden = false;
    dom.loadingCount.textContent = state.data.nodes.length;

    buildDataSets();

    var options = {
      physics: {
        stabilization: { iterations: 200, updateInterval: 25, fit: true },
        barnesHut: { gravitationalConstant: -6000, springLength: 140, springConstant: 0.02 }
      },
      interaction: {
        hover: true,
        tooltipDelay: 200,
        navigationButtons: false,
        zoomView: true,
        keyboard: { enabled: false } // 我们自己接管键盘
      },
      nodes: { shape: "dot", scaling: { min: 8, max: 14 } },
      edges: {
        smooth: { type: "continuous" },
        arrows: { to: { enabled: false } }
      }
    };

    state.network = new vis.Network(
      dom.canvas,
      { nodes: state.nodes, edges: state.edges },
      options
    );

    state.network.once("stabilizationIterationsDone", function () {
      dom.stateLoading.hidden = true;
      state.network.fit({ animation: { duration: 400, easingFunction: "easeOutCubic" } });
    });

    state.network.on("selectNode", function (params) {
      if (params.nodes && params.nodes[0]) openDrawer(params.nodes[0]);
    });
    state.network.on("click", function (params) {
      if (!params.nodes || !params.nodes.length) closeDrawer();
    });

    syncBrandAndFooter();
    updatePartialPill();
    wireFilters();
    wireSearch();
    wireDrawer();
    wireKeyboard();
    wireResize();
  }

  // ─── 8. 品牌栏 / footer 数字同步 ─────────────────────────────
  function syncBrandAndFooter() {
    var total = (state.data && state.data.nodes) ? state.data.nodes.length : 0;
    var edgesTotal = (state.data && state.data.edges) ? state.data.edges.length : 0;
    dom.brandNodes.textContent = total;
    dom.brandEdges.textContent = edgesTotal;
    dom.footTotal.textContent = total;
    dom.footShown.textContent = state.visible ? state.visible.size : 0;
    dom.footIsolated.textContent = state.isolatedCount;
    var comms = {};
    if (state.data && state.data.nodes) {
      state.data.nodes.forEach(function (n) {
        if (n.community != null) comms[n.community] = 1;
      });
    }
    dom.footCommunities.textContent = Object.keys(comms).length;
    dom.footFilter.textContent = activeFilterLabel();
  }

  function activeFilterLabel() {
    var on = Object.keys(state.filters).filter(function (k) {
      return state.filters[k];
    });
    return on.length ? on.join("+") : "none";
  }

  function updatePartialPill() {
    var total = state.data.nodes.length;
    var shown = state.visible ? state.visible.size : 0;
    if (shown < total) {
      dom.pillShown.textContent = shown;
      dom.pillTotal.textContent = total;
      dom.partialPill.setAttribute("data-show", "1");
    } else {
      dom.partialPill.setAttribute("data-show", "0");
    }
  }

  // ─── 9. 过滤 ─────────────────────────────────────────────────
  function wireFilters() {
    [["fltExtracted", "EXTRACTED"],
     ["fltInferred",  "INFERRED"],
     ["fltAmbiguous", "AMBIGUOUS"]].forEach(function (pair) {
      var el = dom[pair[0]];
      state.filters[pair[1]] = !!el.checked;
      el.addEventListener("change", function () {
        state.filters[pair[1]] = !!el.checked;
        applyFilters();
        syncBrandAndFooter();
      });
    });
  }

  function applyFilters() {
    if (!state.edges) return;
    var current = state.edges.getIds();
    state.edges.remove(current);
    var items = state.data.edges
      .filter(function (e) { return state.filters[e.type || "EXTRACTED"]; })
      .filter(function (e) { return state.visible.has(e.from) && state.visible.has(e.to); })
      .map(function (e, i) {
        return Object.assign(
          { id: e.id || "e" + i, from: e.from, to: e.to, type: e.type || "EXTRACTED" },
          edgeStyle(e.type || "EXTRACTED")
        );
      });
    state.edges.add(items);
  }

  // ─── 10. 搜索 + SEARCH-HIDDEN-HIT 三件套 ─────────────────────
  function wireSearch() {
    dom.search.addEventListener("input", function () {
      clearTimeout(state.searchTimer);
      state.searchTimer = setTimeout(doSearch, 120);
    });
    dom.search.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        doSearch(true);
      } else if (e.key === "Escape") {
        if (dom.search.value) {
          dom.search.value = "";
          doSearch();
        }
      }
    });
  }

  function doSearch(commit) {
    var q = (dom.search.value || "").trim().toLowerCase();
    if (!q) {
      dom.searchDropdown.setAttribute("data-open", "0");
      return;
    }
    var matches = state.data.nodes.filter(function (n) {
      var label = (n.label || n.id || "").toString().toLowerCase();
      return label.indexOf(q) !== -1;
    });
    if (!matches.length) {
      showNoMatch();
      return;
    }
    dom.searchDropdown.setAttribute("data-open", "0");
    var target = matches[0];
    if (commit || matches.length === 1) {
      focusNode(target.id, { pulse: true, openDrawer: true });
    }
  }

  function showNoMatch() {
    var top3 = state.data.nodes.slice(0, 3).map(function (n) {
      return n.label || n.id;
    });
    dom.searchDropdown.innerHTML =
      "无匹配。试试：" + top3.map(function (s) {
        return "<code>" + escapeHtml(s) + "</code>";
      }).join(" · ");
    dom.searchDropdown.setAttribute("data-open", "1");
  }

  // 聚焦某节点；若不在 top-30 则先加入（SEARCH-HIDDEN-HIT 三件套）
  function focusNode(id, opts) {
    opts = opts || {};
    var wasHidden = !state.visible.has(id);
    if (wasHidden) ensureVisible(id);

    if (!state.nodes.get(id)) return;

    // ① canvas pan 到目标
    state.network.focus(id, {
      scale: 1.2,
      animation: { duration: 250, easingFunction: "easeOutCubic" }
    });

    // ② pulse 一次：半径 8→14→8，400ms
    pulseNode(id);

    // ③ toast 通知（仅 hidden hit 时）
    if (wasHidden) {
      var n = state.data.nodes.filter(function (x) { return x.id === id; })[0];
      showToast("已从隐藏节点加入 " + (n ? (n.label || n.id) : id));
    }

    if (opts.openDrawer) openDrawer(id);
  }

  function ensureVisible(id) {
    var n = state.data.nodes.filter(function (x) { return x.id === id; })[0];
    if (!n) return;
    state.visible.add(id);
    state.nodes.add(Object.assign({ id: id, label: n.label || id }, nodeStyle(n)));
    var newEdges = state.data.edges.filter(function (e) {
      if (!state.filters[e.type || "EXTRACTED"]) return false;
      return (e.from === id && state.visible.has(e.to))
          || (e.to   === id && state.visible.has(e.from));
    }).map(function (e, i) {
      return Object.assign(
        { id: e.id || "e" + id + "-" + i, from: e.from, to: e.to, type: e.type || "EXTRACTED" },
        edgeStyle(e.type || "EXTRACTED")
      );
    });
    try { state.edges.add(newEdges); } catch (e) { /* 重复 id，跳过 */ }
    updatePartialPill();
    syncBrandAndFooter();
  }

  function pulseNode(id) {
    var steps = [{ size: 14, t: 200 }, { size: 8, t: 200 }];
    var base = state.nodes.get(id);
    if (!base) return;
    var delay = 0;
    steps.forEach(function (s) {
      delay += s.t;
      setTimeout(function () {
        try { state.nodes.update({ id: id, size: s.size }); } catch (_) {}
      }, delay);
    });
  }

  function showToast(text) {
    dom.toast.textContent = text;
    dom.toast.setAttribute("data-show", "1");
    clearTimeout(state.toastTimer);
    state.toastTimer = setTimeout(function () {
      dom.toast.setAttribute("data-show", "0");
    }, 2000);
  }

  // ─── 11. 抽屉 ────────────────────────────────────────────────
  function wireDrawer() {
    dom.drawerClose.addEventListener("click", closeDrawer);
    dom.drawerOpenFull.addEventListener("click", function () {
      var id = dom.drawer.getAttribute("data-node-id");
      var n = state.data.nodes.filter(function (x) { return x.id === id; })[0];
      if (!n || !n.source_path) return;
      try { window.open("file://" + n.source_path, "_blank"); }
      catch (_) { /* 某些浏览器禁止 file:// open，忽略 */ }
    });
    // 抽屉内 wikilink 代理
    dom.drawerBody.addEventListener("click", function (e) {
      var a = e.target.closest("a.wikilink");
      if (!a) return;
      e.preventDefault();
      if (a.classList.contains("wikilink--dead")) return;
      var targetId = a.getAttribute("data-target");
      if (targetId) focusNode(targetId, { pulse: true, openDrawer: true });
    });
  }

  function openDrawer(nodeId) {
    var n = state.data.nodes.filter(function (x) { return x.id === nodeId; })[0];
    if (!n) return;

    dom.drawer.setAttribute("data-node-id", nodeId);
    dom.drawerTitle.textContent = n.label || n.id;

    if (n.community != null) {
      dom.drawerBadge.textContent = "社区 " + n.community;
      dom.drawerBadge.hidden = false;
    } else {
      dom.drawerBadge.hidden = true;
    }

    // DEGRADED：> 500 行截断
    var content = n.content || "";
    var lines = content.split("\n");
    if (lines.length > 500) {
      content = lines.slice(0, 500).join("\n") + "\n\n…（已截断）";
      dom.drawerBannerTxt.textContent = "已截断显示前 500 行 · 完整内容 " + lines.length + " 行";
      dom.drawerBanner.setAttribute("data-show", "1");
      dom.drawerOpenFull.style.display = n.source_path ? "" : "none";
    } else {
      dom.drawerBanner.setAttribute("data-show", "0");
    }

    renderDrawerBody(content);

    dom.layout.classList.add("drawer-open");
    dom.drawer.setAttribute("aria-hidden", "false");
  }

  function closeDrawer() {
    dom.layout.classList.remove("drawer-open");
    dom.drawer.setAttribute("aria-hidden", "true");
    try { state.network && state.network.unselectAll(); } catch (_) {}
  }

  function renderDrawerBody(md) {
    // 1) 先让 marked 做 wikilink 预处理：[[Name]] / [[id|label]]
    var withLinks = md.replace(/\[\[([^\]]+)\]\]/g, function (_, inner) {
      var parts = inner.split("|");
      var target = parts[0].trim();
      var label = (parts[1] || parts[0]).trim();
      var exists = state.data.nodes.some(function (x) {
        return x.id === target || (x.label && x.label === target);
      });
      var cls = exists ? "wikilink" : "wikilink wikilink--dead";
      var ti = exists ? "" : ' tabindex="0" title="节点 \'' + escapeAttr(target) + "' 未找到\"";
      var resolved = exists ? target : target;
      return '<a href="#" class="' + cls + '" data-target="'
           + escapeAttr(resolved) + '"' + ti + ">" + escapeHtml(label) + "</a>";
    });

    // 2) marked 渲染 + DOMPurify 清洗
    var html = marked.parse(withLinks, { breaks: false, gfm: true });
    var safe = DOMPurify.sanitize(html, {
      ADD_ATTR: ["target", "data-target", "tabindex"]
    });
    dom.drawerBody.innerHTML = safe;
    dom.drawerBody.scrollTop = 0;
  }

  // ─── 12. 键盘快捷键 ──────────────────────────────────────────
  function wireKeyboard() {
    document.addEventListener("keydown", function (e) {
      // Esc：清搜索 → 关抽屉
      if (e.key === "Escape") {
        if (dom.search.value) {
          dom.search.value = "";
          dom.searchDropdown.setAttribute("data-open", "0");
        } else if (dom.layout.classList.contains("drawer-open")) {
          closeDrawer();
        }
        return;
      }
      // `/`：聚焦搜索（除非正在输入）
      if (e.key === "/" && document.activeElement !== dom.search) {
        var tag = (document.activeElement && document.activeElement.tagName) || "";
        if (tag !== "INPUT" && tag !== "TEXTAREA") {
          e.preventDefault();
          dom.search.focus();
          dom.search.select();
        }
      }
      // canvas 聚焦时的方向 / zoom / Enter
      if (document.activeElement === dom.canvas) {
        var step = 40;
        var moves = { ArrowLeft: [step, 0], ArrowRight: [-step, 0],
                      ArrowUp:   [0, step], ArrowDown:  [0, -step] };
        if (moves[e.key]) {
          e.preventDefault();
          state.network.moveTo({
            offset: { x: moves[e.key][0], y: moves[e.key][1] },
            animation: { duration: 150, easingFunction: "easeOutCubic" }
          });
        } else if (e.key === "+" || e.key === "=") {
          e.preventDefault();
          state.network.moveTo({ scale: state.network.getScale() * 1.2 });
        } else if (e.key === "-" || e.key === "_") {
          e.preventDefault();
          state.network.moveTo({ scale: state.network.getScale() / 1.2 });
        } else if (e.key === "Enter") {
          var sel = state.network.getSelectedNodes();
          if (sel && sel[0]) openDrawer(sel[0]);
        }
      }
    });
  }

  // ─── 13. resize ──────────────────────────────────────────────
  function wireResize() {
    window.addEventListener("resize", function () {
      if (state.network) state.network.redraw();
      if (window.innerWidth < 768 && !state.mobileAccepted) {
        dom.overlayMobile.setAttribute("data-show", "1");
      }
    });
  }

  // ─── 14. 小工具 ──────────────────────────────────────────────
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c];
    });
  }
  function escapeAttr(s) { return escapeHtml(s); }

})();
</script>

</body>
